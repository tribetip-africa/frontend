name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.tribetip.africa
          NEXT_PUBLIC_TRIBETIP_PLATFORM_URL: https://tribetip.africa

      - name: Audit production dependencies (high+)
        run: npm audit --audit-level=high --omit=dev
