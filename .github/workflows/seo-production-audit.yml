name: Production SEO audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: Audit tribetip.africa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production SEO audit
        run: npm run audit:seo
        env:
          SEO_AUDIT_BASE_URL: https://tribetip.africa
