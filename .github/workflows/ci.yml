name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_API_URL: https://api.tribetip.africa
  NEXT_PUBLIC_TRIBETIP_PLATFORM_URL: https://tribetip.africa

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript
        run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:ci

  error-handling:
    name: Error handling (unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run error handling tests
        run: npm run test:errors

  live:
    name: Live tests
    runs-on: ubuntu-latest
    env:
      LIVE_API_URL: http://127.0.0.1:3001
      LIVE_WEB_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_TRIBETIP_PLATFORM_URL: http://127.0.0.1:3000
      TRIBETIP_DIR: ${{ github.workspace }}/tribetip
      RAILS_ENV: development
      SECRET_KEY_BASE: live_ci_secret_key_base_0123456789abcdef
      DB_HOST: 127.0.0.1
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: tribetip_live_ci
      DB_REPLICA_HOST: 127.0.0.1
      DB_REPLICA_DATABASE: tribetip_live_ci
      DB_REPLICA_USERNAME: postgres
      DB_REPLICA_PASSWORD: postgres
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: tribetip-africa/tribetip
          path: tribetip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: tribetip/.ruby-version
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/tribetip/Gemfile
          BUNDLE_PATH: ${{ github.workspace }}/tribetip/vendor/bundle

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Prepare API database
        working-directory: tribetip
        run: bin/rails db:prepare

      - name: Start API server
        working-directory: tribetip
        run: |
          bin/rails server -p 3001 -b 127.0.0.1 > /tmp/tribetip-api.log 2>&1 &
          echo $! > /tmp/tribetip-api.pid

      - name: Start web server
        run: |
          npm run dev -- -p 3000 -H 127.0.0.1 > /tmp/tribetip-web.log 2>&1 &
          echo $! > /tmp/tribetip-web.pid

      - name: Run live test suite
        run: npm run test:live

      - name: Stop servers
        if: always()
        run: |
          if [ -f /tmp/tribetip-api.pid ]; then kill "$(cat /tmp/tribetip-api.pid)" || true; fi
          if [ -f /tmp/tribetip-web.pid ]; then kill "$(cat /tmp/tribetip-web.pid)" || true; fi

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_TRIBETIP_PLATFORM_URL: ${{ env.NEXT_PUBLIC_TRIBETIP_PLATFORM_URL }}

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (high+)
        run: npm audit --audit-level=high --omit=dev

  ci:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, error-handling, live, build, security]
    if: always()
    steps:
      - name: Require all checks to pass
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.error-handling.result }}" != "success" ||
                "${{ needs.live.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ||
                "${{ needs.security.result }}" != "success" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
